name: Sync Upstream

on:
  schedule:
    - cron: '0 * * * *'      # 每小时自动运行
  workflow_dispatch:        # 支持手动触发

jobs:
  sync_task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 必须显式使用 token 否则 push 会失败
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Logic
        run: |
          # 1. 配置身份
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 2. 添加原仓库
          git remote add upstream https://github.com/w1249178256/xyzw_web_helper.git
          
          # 3. 获取更新
          git fetch upstream main
          
          # 4. 强制切换到 main
          git checkout main
          
          # 5. 合并原仓库代码 (允许合并不相关的历史)
          git merge upstream/main --allow-unrelated-histories --no-edit || (echo "Conflict detected" && exit 1)
          
          # 6. 推送到你自己的 origin
          git push origin main
